repos:
  # Ruff - Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      # Run linter and auto-fix issues
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
        stages: [pre-commit]
      # Format code
      - id: ruff-format
        types_or: [python, pyi]
        stages: [pre-commit]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
  - repo: local
    hooks:
      - id: uv-lock-upgrade
        name: Run uv lock --upgrade
        entry: uv lock --upgrade
        language: system
        pass_filenames: false
        stages: [manual]
      - id: pre-commit-autoupdate
        name: autoupdate pre-commit
        entry: pre-commit autoupdate
        language: system
        pass_filenames: false
        stages: [manual]
      - id: biome-check
        name: biome check
        entry: biome check --write
        language: node
        additional_dependencies: ["@biomejs/biome@2.4.12"]
        files: \.(?:[cm]?[jt]sx?|jsonc?)$
        pass_filenames: true
  # Pre-commit hooks (official)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # General checks
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      # Security checks
      - id: detect-private-key
      # File checks
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: forbid-submodules
  # Gitleaks - Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  # Zizmor - GitHub Actions security analysis
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.24.1
    hooks:
      - id: zizmor
  # Tombi - TOML linting and formatting
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: v0.9.19
    hooks:
      - id: tombi-format
        exclude: ^(pyproject\.toml|uv\.lock)$
      - id: tombi-lint
        exclude: ^(pyproject\.toml|uv\.lock)$
  # Renovate config validator
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.132.1
    hooks:
      - id: renovate-config-validator
  # Shellcheck - Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [-x, --severity=warning]
        files: \.(sh|bash)$
  - repo: https://github.com/yawlabs/ctxlint
    rev: v0.9.17
    hooks:
      - id: ctxlint
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-dependabot
      - id: check-github-actions
      - id: check-github-workflows
  - repo: https://github.com/mangiucugna/gha-updater-pre-commit
    rev: v0.1
    hooks:
      - id: gha-update
        stages: [manual]
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.1.76
    hooks:
      - id: rumdl
      - id: rumdl-fmt
