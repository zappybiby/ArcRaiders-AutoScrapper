repos:
  # Ruff - Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      # Run linter and auto-fix issues
      - id: ruff
        args: [--fix --exit-non-zero-on-fix]
        stages: [pre-commit]
      # Format code
      - id: ruff-format
        stages: [pre-commit]

  # Pre-commit hooks (official)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # General checks
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        args: [--allow-multiple-documents]
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-xml
        stages: [pre-commit]

      # Security checks
      - id: detect-private-key
        stages: [pre-commit]

      # File checks
      - id: check-added-large-files
        args: [--maxkb=1000]
        stages: [pre-commit]
      - id: check-case-conflict
        stages: [pre-commit]
      - id: check-executables-have-shebangs
        stages: [pre-commit]
      - id: check-shebang-scripts-are-executable
        stages: [pre-commit]
      - id: forbid-submodules
        stages: [pre-commit]

  # Gitleaks - Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        stages: [pre-commit]

  # Zizmor - GitHub Actions security analysis
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.24.1
    hooks:
      - id: zizmor
        stages: [pre-commit]

  # Tombi - TOML linting and formatting
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: v0.9.17
    hooks:
      - id: tombi-format
        exclude: ^(pyproject\.toml|uv\.lock)$
        stages: [pre-commit]
      - id: tombi-lint
        exclude: ^(pyproject\.toml|uv\.lock)$
        stages: [pre-commit]

  # Renovate config validator
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.124.0
    hooks:
      - id: renovate-config-validator
        stages: [pre-commit]

  # Shellcheck - Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-x, --severity=warning]
        files: \.(sh|bash)$
        stages: [pre-commit]

  - repo: https://github.com/yawlabs/ctxlint
    rev: v0.9.0
    hooks:
      - id: ctxlint
