name: Ruff
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: ruff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Tesseract OCR system dependencies
        run: |
          sudo apt-get update -qq >/dev/null 2>&1 && sudo apt-get install -yqq --no-install-recommends tesseract-ocr libtesseract-dev libleptonica-dev build-essential pkg-config python3-evdev
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Install dependencies
        run: uv sync --all-extras --frozen
      - name: Run Ruff
        run: uv run ruff check src/ tests/ scripts/
      - name: Run basedpyright
        run: uv run basedpyright src/
      - name: Run pytest
        run: uv run pytest
