name: Daily Data Update
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
permissions:
  actions: read
  contents: write
  pull-requests: write
concurrency:
  group: daily-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    environment: daily-data-update
    env:
      METAFORGE_SUPABASE_ANON_KEY: ${{ secrets.METAFORGE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Install dependencies
        run: uv sync --all-packages --frozen --no-dev
      - name: Update snapshot + default rules
        run: |
          uv run python scripts/update_snapshot_and_defaults.py \
            --report-json artifacts/update-report.json \
            --report-md artifacts/update-report.md
      - name: Upload update report artifact
        uses: actions/upload-artifact@v7
        with:
          name: daily-data-update-report
          path: |
            artifacts/update-report.json
            artifacts/update-report.md
      - name: Check for tracked changes
        id: changes
        run: |
          uv run python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          report_path = Path("artifacts/update-report.json")
          if not report_path.exists():
              print("Missing artifacts/update-report.json", file=sys.stderr)
              raise SystemExit(1)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          snapshot = report.get("snapshot", {})
          changed_files = snapshot.get("changedFiles", [])
          if not isinstance(changed_files, list):
              print("snapshot.changedFiles is not a list", file=sys.stderr)
              raise SystemExit(1)

          has_changes = bool(changed_files)
          if has_changes:
              print("Detected substantive tracked changes:")
              for file_path in changed_files:
                  print(f" - {file_path}")
          else:
              print(
              "No substantive tracked changes (timestamp-only updates ignored)."
          )

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"has_changes={'true' if has_changes else 'false'}\n")
          PY

      - name: Commit and push update branch
        if: steps.changes.outputs.has_changes == 'true'
        id: commit_push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git

          git switch -C bot/daily-data-update
          git add \
            src/autoscrapper/progress/data/items.json \
            src/autoscrapper/progress/data/quests.json \
            src/autoscrapper/progress/data/quests_by_trader.json \
            src/autoscrapper/progress/data/metadata.json \
            src/autoscrapper/items/items_rules.default.json

          if git diff --cached --quiet; then
            echo "has_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore(data): daily Metaforge snapshot + default rules"
          git push --force-with-lease origin HEAD:bot/daily-data-update
          echo "has_commit=true" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: steps.commit_push.outputs.has_commit == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          uv run python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from urllib.error import HTTPError

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          owner = repo.split("/", 1)[0]

          title = "chore(data): daily Metaforge snapshot + default rules"
          head = "bot/daily-data-update"
          base = "main"
          labels = ["automated", "data-update"]

          with open("artifacts/update-report.md", "r", encoding="utf-8") as f:
              body = f.read()

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "daily-data-update-workflow",
          }

          def api(method, path, data=None, query=None):
              url = f"https://api.github.com/repos/{repo}{path}"
              if query:
                  url += "?" + urllib.parse.urlencode(query)
              payload = None
              request = urllib.request.Request(url, method=method, headers=headers)
              if data is not None:
                  payload = json.dumps(data).encode("utf-8")
                  request.add_header("Content-Type", "application/json")
              with urllib.request.urlopen(request, payload) as response:
                  text = response.read().decode("utf-8")
              return json.loads(text) if text else {}

          pulls = api(
              "GET",
              "/pulls",
              query={
                  "state": "open",
                  "head": f"{owner}:{head}",
                  "base": base,
                  "per_page": "1",
              },
          )

          if pulls:
              number = pulls[0]["number"]
              api("PATCH", f"/pulls/{number}", data={"title": title, "body": body, "base": base})
              print(f"Updated PR #{number}")
          else:
              pr = api("POST", "/pulls", data={"title": title, "head": head, "base": base, "body": body})
              number = pr["number"]
              print(f"Created PR #{number}")

          try:
              api("POST", f"/issues/{number}/labels", data={"labels": labels})
          except HTTPError as exc:
              print(f"Warning: failed to set labels ({exc.code})")
          PY
